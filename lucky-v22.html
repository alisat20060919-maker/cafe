<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>星糖扭蛋 v22</title><style>:root{--bg:url('https://drive.google.com/thumbnail?id=1wN2o8H0BZqnJ9iguet5Wl1eZBZ637iNS&sz=w1200');--machine:url('https://drive.google.com/thumbnail?id=1KzsZfW8coXTk4O_kuqLN87MCMI2C9JK7&sz=w900');--btn1:url('https://drive.google.com/thumbnail?id=1kHPFv6JMbpbcRkDZX143_E3rrwUylOvc&sz=w900');--btn10:url('https://drive.google.com/thumbnail?id=1EhfU4AlHG5qBPkja6trFn3pfzzmZUXOA&sz=w900');--r:url('https://drive.google.com/thumbnail?id=1bKpWUL93s2spMxLW9RNa0ZttKnVkPa65&sz=w700');--sr:url('https://drive.google.com/thumbnail?id=10AcrjNWRDdQO2w133fZVPkNHajIPlDLq&sz=w700');--ssr:url('https://drive.google.com/thumbnail?id=1U4thEXAcpEGJn6vt7dQcHiMuCFrco9Ox&sz=w700');--pop:url('https://drive.google.com/thumbnail?id=1MVxw_e2C9fuXuFAqXwDE6VN9zUlfbkQj&sz=w1000');--help:url('https://drive.google.com/thumbnail?id=1IF875UNiMQ2I7Nbw5D9bDM5HMW4cDwXf&sz=w300');--ticket:url('https://drive.google.com/thumbnail?id=1pLijYexb5mKej1ZdeVY45TgHpxsF-_No&sz=w300')}*{box-sizing:border-box}body{margin:0;background:#071a12;color:#fff4d7;font-family:serif}.app{max-width:430px;margin:auto;min-height:100vh;padding:14px;background:radial-gradient(circle at top,#23533e,#071a12 70%)}.top{display:flex;justify-content:space-between;align-items:end}.lv{font-size:12px;letter-spacing:.2em;opacity:.75}.title{font-size:34px;font-weight:900}.back{background:linear-gradient(#fff0a9,#efb85e);color:#2b1d13;border-radius:999px;padding:8px 12px;text-decoration:none;font-weight:900}.pill{display:inline-flex;align-items:center;gap:4px;border:2px solid #b89b58;border-radius:999px;padding:6px 10px;background:#2a2118d9;margin:10px 6px 10px 0}.pill img{width:28px}.stage{border:3px solid #d8b978;border-radius:28px;overflow:hidden;background:linear-gradient(#0001,#0008),var(--bg) center/cover no-repeat;padding:12px 18px 18px;box-shadow:0 12px 28px #0008}.stage-head{display:flex;justify-content:space-between}.tag{background:#f7d87b;color:#2a1d16;border-radius:999px;padding:8px 14px;font-weight:900;letter-spacing:.12em}.help{width:44px;height:44px;border:0;background:var(--help) center/contain no-repeat}.machine-box{height:210px;position:relative}.holy{position:absolute;left:50%;top:40%;width:270px;height:270px;border-radius:50%;transform:translate(-50%,-50%);background:repeating-conic-gradient(rgba(255,248,204,.75) 0 4deg,rgba(255,255,255,.25) 4deg 7deg,transparent 7deg 17deg),radial-gradient(circle,rgba(255,255,220,.8) 0 9%,rgba(255,218,91,.35) 23%,transparent 67%);filter:blur(2px);mix-blend-mode:screen;animation:spin 14s linear infinite}.core{position:absolute;left:50%;top:40%;width:115px;height:115px;border-radius:50%;transform:translate(-50%,-50%);background:radial-gradient(circle,#fffbdcaa,transparent 70%);filter:blur(9px);mix-blend-mode:screen}.machine{position:absolute;left:50%;top:22%;width:188px;height:188px;transform:translate(-50%,-50%);object-fit:contain;filter:drop-shadow(0 14px 14px #0009);animation:float 3s ease-in-out infinite}.btn{height:72px;width:100%;border:0;background:center/100% 100% no-repeat;color:#fff8d7;font-size:22px;font-weight:900;text-shadow:0 3px #0008;margin-top:10px}.one{background-image:var(--btn1)}.ten{background-image:var(--btn10)}.small{display:grid;grid-template-columns:1fr 1fr;gap:8px}.small button{height:44px;border:2px solid #b89b58;border-radius:16px;background:#2a1d16dd;color:#fff4d7;font-weight:900}.results{margin-top:14px;padding:22px 14px 16px;border-radius:26px;min-height:280px;background:linear-gradient(#0001,#0003),var(--pop) center/100% 100% no-repeat}.results h2{text-align:center;margin:0 0 10px;text-shadow:0 3px #0008}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}.grid.draw{grid-template-columns:repeat(2,1fr);gap:8px}.grid.single{grid-template-columns:1fr;max-width:220px;margin:auto}.card{min-height:150px;background:center/contain no-repeat;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:36px 8px 26px;position:relative;filter:drop-shadow(0 8px 8px #0005)}.grid.draw .card{min-height:198px;padding:52px 18px 40px}.r{background-image:var(--r)}.sr{background-image:var(--sr)}.ssr{background-image:var(--ssr)}.rar{position:absolute;top:12px;left:50%;transform:translateX(-50%);background:#fff7;border-radius:99px;padding:2px 7px;font:900 10px sans-serif;color:#5a2f19}.grid.draw .rar{top:18px;font-size:12px}.icon{font-size:23px}.grid.draw .icon{font-size:31px}.name{font-size:11px;font-weight:900;color:#2a1d16;text-shadow:0 1px #fff8}.grid.draw .name{font-size:15px}.book{margin-top:12px;border:2px solid #b89b58;border-radius:20px;background:#2a1d16dd;padding:12px}.toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);background:#2a1d16ee;border:2px solid #d8b978;border-radius:999px;padding:8px 14px;display:none}@keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg)}}@keyframes float{50%{transform:translate(-50%,-57%)}}</style></head><body><main class="app"><div class="top"><div><div class="lv">LV.05 / GACHA</div><div class="title">星糖扭蛋</div></div><a class="back" href="room-v18.html">回店內</a></div><div><span class="pill">✦ 星糖 <b id="sugar">1280</b></span><span class="pill"><img src="https://drive.google.com/thumbnail?id=1pLijYexb5mKej1ZdeVY45TgHpxsF-_No&sz=w300">靈感券 <b id="ticket">3</b></span></div><section class="stage"><div class="stage-head"><span class="tag">MOONLIGHT WISH</span><button class="help"></button></div><div class="machine-box"><div class="holy"></div><div class="core"></div><img class="machine" src="https://drive.google.com/thumbnail?id=1KzsZfW8coXTk4O_kuqLN87MCMI2C9JK7&sz=w900"></div><button class="btn one" id="one">抽 1 張<br><small>券 1 / 星糖 160</small></button><button class="btn ten" id="ten">抽 10 張<br><small>星糖 1600</small></button><div class="small"><button id="preview">框框預覽</button><button id="clear">清空結果</button></div></section><section class="results"><h2 id="ttl">框框預覽</h2><div class="grid" id="res"></div></section><section class="book"><b>今日收藏</b><div id="bag">尚未收藏</div></section></main><div class="toast" id="toast">已抽取</div><script>let sugar=1280,ticket=3,bag=[];const pool=[['ssr','🌙','月光花瓣王冠'],['ssr','🌌','夜空碎片禮盒'],['sr','🍓','星星莓奶油塔'],['sr','💌','神祕客人來信'],['r','🍪','森林餅乾'],['r','🪵','小木牌菜單'],['r','🧺','莓果籃']];const preview=[['r','🍪','R框'],['sr','🍓','SR框'],['ssr','🌙','SSR框']];const $=s=>document.querySelector(s),res=$('#res'),ttl=$('#ttl');function card(c){return `<article class="card ${c[0]}"><span class="rar">${c[0].toUpperCase()}</span><div class="icon">${c[1]}</div><div class="name">${c[2]}</div></article>`}function showPreview(){ttl.textContent='框框預覽';res.className='grid';res.innerHTML=preview.map(card).join('')}function pick(){let r=Math.random(),k=r<.08?'ssr':r<.32?'sr':'r',a=pool.filter(x=>x[0]===k);return a[Math.floor(Math.random()*a.length)]}function draw(n){let out=[];for(let i=0;i<n;i++){let c=pick();out.push(c);bag.push(c)}ttl.textContent='抽取結果';res.className=n===1?'grid single':'grid draw';res.innerHTML=out.map(card).join('');$('#bag').textContent=bag.slice(-8).map(x=>x[1]+x[2]).join('、');}$('#one').onclick=()=>{if(ticket>0)ticket--;else if(sugar>=160)sugar-=160;draw(1);$('#ticket').textContent=ticket;$('#sugar').textContent=sugar};$('#ten').onclick=()=>{if(sugar>=1600){sugar-=1600;draw(10);$('#sugar').textContent=sugar}};$('#preview').onclick=showPreview;$('#clear').onclick=showPreview;showPreview();</script></body></html>
