<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>星糖扭蛋</title><style>body{margin:0;background:#061a12;color:#fff4d7;font-family:serif}.app{max-width:430px;margin:auto;min-height:100vh;padding:14px;background:radial-gradient(circle at top,#24533e,#061a12 70%)}.top{display:flex;justify-content:space-between;align-items:end}.lv{font-size:12px;letter-spacing:.2em;opacity:.75}.title{font-size:34px;font-weight:900}.back{background:#f4cf75;color:#2b1d13;border-radius:999px;padding:9px 14px;text-decoration:none;font-weight:900}.pill{display:inline-block;border:2px solid #b89b58;border-radius:999px;padding:7px 12px;background:#2a2118;margin:10px 6px 12px 0}.stage{border:3px solid #d8b978;border-radius:28px;overflow:hidden;background:linear-gradient(#0001,#0009),url(https://drive.google.com/thumbnail?id=1wN2o8H0BZqnJ9iguet5Wl1eZBZ637iNS&sz=w1200) center/cover no-repeat;padding:12px 16px 18px}.head{display:flex;justify-content:space-between}.tag{background:#f7d87b;color:#2a1d16;border-radius:999px;padding:8px 14px;font-weight:900}.help{width:44px;height:44px;border:0;background:url(https://drive.google.com/thumbnail?id=1IF875UNiMQ2I7Nbw5D9bDM5HMW4cDwXf&sz=w300) center/contain no-repeat}.box{height:265px;position:relative}.aura{position:absolute;left:50%;top:46%;width:250px;height:250px;border-radius:50%;transform:translate(-50%,-50%);background:radial-gradient(circle,#fff7 0 12%,#ffd85d55 30%,transparent 66%);filter:blur(8px);mix-blend-mode:screen}.burst{position:absolute;left:50%;top:46%;width:270px;height:270px;border-radius:50%;transform:translate(-50%,-50%) scale(.15);opacity:0;background:repeating-conic-gradient(#fff8 0 5deg,#ffd95a55 5deg 10deg,transparent 10deg 20deg);filter:blur(1px);mix-blend-mode:screen}.stage.run .burst{animation:boom .9s ease-out}.machine{position:absolute;left:50%;top:46%;width:190px;height:190px;transform:translate(-50%,-50%);object-fit:contain;filter:drop-shadow(0 16px 14px #000a)}.stage.run .machine{animation:shake .6s}.draws{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:2px}.draw{height:78px;border:2px solid #e3c873;border-radius:22px;color:#fff8d7;font-weight:900;font-size:20px;text-shadow:0 3px #0008;box-shadow:inset 0 2px 0 #fff5,0 6px 10px #0006}.draw small{display:block;font-size:12px}.d1{background:linear-gradient(#315e50,#172b24)}.d10{background:linear-gradient(#b64c57,#5b1822)}.mini{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}.mini button{height:42px;border:2px solid #b89b58;border-radius:16px;background:#2a1d16dd;color:#fff4d7;font-weight:900}.pool{margin-top:12px;border:2px solid #b89b58;border-radius:20px;background:#2a1d16dd;padding:12px}.pool b{display:block;margin-bottom:8px}.chips{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}.chip{border-radius:14px;padding:8px 4px;text-align:center;font-weight:900}.r{background:#6b4a32}.sr{background:#5b3c83}.ssr{background:#c79432;color:#321c08}.modal{position:fixed;inset:0;background:#000b;display:none;place-items:center;padding:20px;z-index:9}.modal.show{display:grid}.card{width:250px;height:340px;position:relative;display:grid;place-items:center;text-align:center;background:linear-gradient(var(--c),var(--c)),url(https://drive.google.com/thumbnail?id=15K5ZOqLi_mBPp7Ms4YHlSjQ4DXF47_It&sz=w800) center/contain no-repeat;background-blend-mode:multiply,normal;filter:drop-shadow(0 12px 18px #000);animation:flip .5s ease-out}.card .txt{font-weight:900;font-size:24px;color:#fff4d7;text-shadow:0 3px #000}.close{margin-top:18px;width:250px;height:48px;border:2px solid #e3c873;border-radius:999px;background:#2a1d16;color:#fff4d7;font-weight:900}.tierR{--c:#6b4a32}.tierSR{--c:#5b3c83}.tierSSR{--c:#d7a33a}@keyframes boom{0%{opacity:0;transform:translate(-50%,-50%) scale(.1)}35%{opacity:1}100%{opacity:0;transform:translate(-50%,-50%) scale(1.2)}}@keyframes shake{25%{transform:translate(-50%,-52%) rotate(-4deg)}60%{transform:translate(-50%,-48%) rotate(4deg)}}@keyframes flip{0%{transform:scaleX(.05) translateY(35px);opacity:.2}100%{transform:scaleX(1);opacity:1}}</style></head><body><main class="app"><div class="top"><div><div class="lv">LV.05 / GACHA</div><div class="title">星糖扭蛋</div></div><a class="back" href="room-v18.html">回店內</a></div><span class="pill">星糖 1280</span><span class="pill">靈感券 3</span><section class="stage" id="stage"><div class="head"><span class="tag">MOONLIGHT WISH</span><button class="help"></button></div><div class="box"><div class="aura"></div><div class="burst"></div><img class="machine" src="https://drive.google.com/thumbnail?id=1KzsZfW8coXTk4O_kuqLN87MCMI2C9JK7&sz=w900"></div><div class="draws"><button class="draw d1" onclick="go(1)">抽 1 張<small>券1 / 星糖160</small></button><button class="draw d10" onclick="go(10)">抽 10 張<small>星糖1600</small></button></div><div class="mini"><button>機率</button><button>紀錄</button><button>圖鑑</button></div></section><section class="pool"><b>可獲得稀有度</b><div class="chips"><div class="chip r">R<br>棕色底</div><div class="chip sr">SR<br>紫色底</div><div class="chip ssr">SSR<br>金色底</div></div></section></main><div class="modal" id="m"><div><div class="card tierR" id="card"><div class="txt" id="txt">R<br>森林餅乾</div></div><button class="close" onclick="m.classList.remove('show')">收下</button></div></div><script>function go(n){stage.classList.remove('run');void stage.offsetWidth;stage.classList.add('run');setTimeout(function(){var x=Math.random(),t=x<.1?'SSR':x<.35?'SR':'R',c=document.getElementById('card');c.className='card tier'+t;txt.innerHTML=t+'<br>'+(t=='SSR'?'月光花瓣':t=='SR'?'星星莓':'森林餅乾');m.classList.add('show')},700)}</script></body></html>
