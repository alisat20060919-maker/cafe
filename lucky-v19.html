<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>精靈咖啡屋｜靈感抽籤</title><style>*{box-sizing:border-box}body{margin:0;background:#071a12;color:#fff4d7;font-family:serif}.app{max-width:430px;margin:auto;min-height:100vh;padding:16px 14px 24px;background:radial-gradient(circle at 50% -10%,#2a7650,#123b29 42%,#071a12)}.top{display:flex;justify-content:space-between;align-items:flex-end;margin:14px 0}.lv{font-size:12px;letter-spacing:.2em;opacity:.75}.title{font-size:32px;font-weight:900;text-shadow:0 4px #0005}.back{border:2px solid #b89b58;border-radius:999px;padding:8px 12px;background:linear-gradient(#fff0a9,#efb85e);color:#2b1d13;text-decoration:none;font-weight:900}.pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}.pill{border:2px solid #b89b58;border-radius:999px;padding:6px 10px;background:#2a2118d9}.banner{border:3px solid #d8b978;border-radius:26px;padding:18px;background:radial-gradient(circle at 70% 20%,#fff4bc66,transparent 23%),linear-gradient(135deg,#40243d,#173f2c 60%,#2f1c14);box-shadow:0 12px 26px #0005;overflow:hidden}.tag{display:inline-block;background:#f7d87b;color:#2b1d13;border-radius:999px;padding:5px 10px;font-size:12px;font-weight:900;letter-spacing:.12em}.banner h1{margin:12px 0 8px;font-size:30px}.banner p{line-height:1.55;margin:0}.altar{margin-top:12px;border:3px solid #d8b978;border-radius:26px;background:linear-gradient(#3a281d,#1f130d);padding:14px}.orb{height:150px;border:2px solid #d8b978;border-radius:22px;background:radial-gradient(circle,#fffbd8 0 8%,#91f0d0 9% 24%,#6d52cc55 25%,transparent 48%),linear-gradient(#111,#2a1d16);display:grid;place-items:center;font-size:56px;filter:drop-shadow(0 0 18px #f7d87b)}.orb.flash{animation:flash .7s}.btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.btn{border:2px solid #b89b58;border-radius:18px;background:linear-gradient(#fff0a9,#efb85e);color:#2b1d13;font-size:18px;font-weight:900;min-height:62px}.btn.dark{background:#2a1d16;color:#fff4d7}.result{margin-top:12px;display:grid;grid-template-columns:repeat(2,1fr);gap:9px}.card{min-height:142px;border:3px solid #b89b58;border-radius:20px;background:linear-gradient(#3a281d,#20140e);padding:10px;box-shadow:0 8px 18px #0004}.card.sr{border-color:#91f0d0;background:linear-gradient(#16483a,#20140e)}.card.ssr{border-color:#ffd66b;background:linear-gradient(135deg,#58305f,#2b1d13);box-shadow:0 0 22px #ffd66b66}.rar{display:inline-block;border-radius:999px;padding:3px 8px;font-size:11px;font-weight:900;background:#d7c6a1;color:#23170f}.icon{font-size:34px}.name{font-size:17px;font-weight:900;margin:8px 0 4px}.desc{font-size:12px;line-height:1.45;opacity:.86}.book{margin-top:12px;border:3px solid #d8b978;border-radius:22px;background:#2a1d16;padding:14px}.chip{display:inline-block;border:2px solid #b89b58;border-radius:999px;padding:5px 8px;background:#fff1;font-size:12px;margin:3px}.toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%) translateY(20px);opacity:0;background:#2a1d16ee;border:2px solid #d8b978;border-radius:999px;padding:8px 14px;transition:.2s}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}@keyframes flash{0%{filter:brightness(1)}50%{filter:brightness(2)}100%{filter:brightness(1)}}</style></head><body><main class="app"><div class="top"><div><div class="lv">LV.05 / INSPIRATION</div><div class="title">靈感抽籤</div></div><a class="back" href="room-v18.html">回店內</a></div><div class="pills"><span class="pill">✦ 星糖 <b id="sugar">1280</b></span><span class="pill">🎟 靈感券 <b id="ticket">3</b></span></div><section class="banner"><span class="tag">DAILY LUCKY CARD</span><h1>月光甜點籤</h1><p>抽取素材、商品靈感與委託主題，適合拿來做每日創作或沉浸式委託點餐。</p></section><section class="altar"><div class="orb" id="orb">🔮</div><div class="btns"><button class="btn" id="one">抽 1 張</button><button class="btn" id="three">抽 3 張</button><button class="btn dark" id="free">今日靈感</button><button class="btn dark" id="clear">清空結果</button></div></section><section class="result" id="result"></section><section class="book"><b>今日收藏</b><div id="book"></div></section></main><div class="toast" id="toast">已抽取</div><script>let sugar=1280,ticket=3,free=false,bag=[];const cards=[['ssr','🌙','月光花瓣王冠','讓整份委託變得溫柔、發光、帶祝福感。'],['ssr','🌌','夜空碎片禮盒','星空藍紫色系，適合夢核與閃亮插圖。'],['sr','🍓','星星莓奶油塔','甜中帶酸，帶金色星屑特效。'],['sr','💌','神祕客人來信','產生一筆新委託主題。'],['sr','🫖','月光拿鐵','安定系飲品，適合溫柔氛圍。'],['r','🍪','森林餅乾','普通甜點素材。'],['r','🪵','小木牌菜單','店內裝飾素材。'],['r','🧺','莓果籃','後山採集素材。'],['r','📜','空白委託單','可以填入客人的需求。']];const $=s=>document.querySelector(s),res=$('#result'),orb=$('#orb'),toast=$('#toast');function ui(){$('#sugar').textContent=sugar;$('#ticket').textContent=ticket;$('#book').innerHTML=bag.map(c=>'<span class="chip">'+c[1]+' '+c[2]+'</span>').join('')||'<span class="chip">尚未收藏</span>'}function msg(t){toast.textContent=t;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),900);try{navigator.vibrate&&navigator.vibrate(20)}catch(e){}}function pick(){let r=Math.random(),kind=r<.08?'ssr':r<.32?'sr':'r';let p=cards.filter(c=>c[0]===kind);return p[Math.floor(Math.random()*p.length)]}function card(c){return '<article class="card '+c[0]+'"><span class="rar">'+c[0].toUpperCase()+'</span><div class="icon">'+c[1]+'</div><div class="name">'+c[2]+'</div><div class="desc">'+c[3]+'</div></article>'}function draw(n){orb.classList.remove('flash');void orb.offsetWidth;orb.classList.add('flash');let out=[];for(let i=0;i<n;i++){let c=pick();out.push(c);bag.push(c)}res.innerHTML=out.map(card).join('');ui();msg('抽到 '+n+' 張靈感卡')}$('#one').onclick=()=>{if(ticket>0){ticket--;draw(1);return}if(sugar<160)return msg('星糖不足');sugar-=160;draw(1)};$('#three').onclick=()=>{if(sugar<480)return msg('星糖不足');sugar-=480;draw(3)};$('#free').onclick=()=>{if(free)return msg('今天已抽過');free=true;draw(1)};$('#clear').onclick=()=>{res.innerHTML='';msg('已清空結果')};ui();</script></body></html>
