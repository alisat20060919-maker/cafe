<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>星糖扭蛋｜精靈咖啡屋</title>
<style>
:root{
--cream:#fff4d7;--gold:#f7d87b;--brown:#2a1d16;
--bg:url('https://drive.google.com/thumbnail?id=1wN2o8H0BZqnJ9iguet5Wl1eZBZ637iNS&sz=w1200');
--machine:url('https://drive.google.com/thumbnail?id=1KzsZfW8coXTk4O_kuqLN87MCMI2C9JK7&sz=w900');
--ring:url('https://drive.google.com/thumbnail?id=1lb0pdhOhflMQ3m2zKBz6FdCUm9qDzLf-&sz=w900');
--ringSSR:url('https://drive.google.com/thumbnail?id=1Zdg5mKm-FsqzQx1gWT4NEahlRm6Qvb_M&sz=w900');
--btn1:url('https://drive.google.com/thumbnail?id=1kHPFv6JMbpbcRkDZX143_E3rrwUylOvc&sz=w900');
--btn10:url('https://drive.google.com/thumbnail?id=1EhfU4AlHG5qBPkja6trFn3pfzzmZUXOA&sz=w900');
--cardR:url('https://drive.google.com/thumbnail?id=1bKpWUL93s2spMxLW9RNa0ZttKnVkPa65&sz=w700');
--cardSR:url('https://drive.google.com/thumbnail?id=10AcrjNWRDdQO2w133fZVPkNHajIPlDLq&sz=w700');
--cardSSR:url('https://drive.google.com/thumbnail?id=1U4thEXAcpEGJn6vt7dQcHiMuCFrco9Ox&sz=w700');
--popup:url('https://drive.google.com/thumbnail?id=1MVxw_e2C9fuXuFAqXwDE6VN9zUlfbkQj&sz=w1000');
--rate:url('https://drive.google.com/thumbnail?id=1U7B47p_Ncw-TyZVIp7N01Me4CoahWao7&sz=w1000');
--help:url('https://drive.google.com/thumbnail?id=1IF875UNiMQ2I7Nbw5D9bDM5HMW4cDwXf&sz=w300');
--close:url('https://drive.google.com/thumbnail?id=1uLqagruLr_vPQLtZMUjAZncmDb32LQQ_&sz=w300');
--ticket:url('https://drive.google.com/thumbnail?id=1pLijYexb5mKej1ZdeVY45TgHpxsF-_No&sz=w300');
}
*{box-sizing:border-box}body{margin:0;background:#071a12;color:var(--cream);font-family:serif}.app{max-width:430px;margin:auto;min-height:100vh;padding:14px 14px 24px;background:radial-gradient(circle at 50% 0,#234d3b,#071a12 68%)}
.top{display:flex;justify-content:space-between;align-items:flex-end;margin:10px 0}.lv{font-size:12px;letter-spacing:.2em;opacity:.75}.title{font-size:34px;font-weight:900;text-shadow:0 4px 0 #0005}.back{color:#2b1d13;background:linear-gradient(#fff0a9,#efb85e);border:2px solid #d8b978;border-radius:999px;padding:8px 12px;text-decoration:none;font-weight:900}.pills{display:flex;gap:8px;align-items:center;margin:8px 0 12px}.pill{border:2px solid #b89b58;border-radius:999px;padding:6px 10px;background:#2a2118d9}.ticket{width:28px;height:28px;object-fit:contain;vertical-align:middle}.stage{position:relative;border:3px solid #d8b978;border-radius:28px;overflow:hidden;min-height:440px;background:linear-gradient(#0001,#0008),var(--bg) center/cover no-repeat;box-shadow:0 12px 28px #0008}.stage-head{position:relative;z-index:6;display:flex;justify-content:space-between;padding:12px 12px 0}.tag{background:#f7d87b;color:#2a1d16;border-radius:999px;padding:5px 10px;font-size:12px;font-weight:900;letter-spacing:.12em}.help{width:44px;height:44px;border:0;background:var(--help) center/contain no-repeat}
.machine-wrap{position:relative;isolation:isolate;height:245px;overflow:visible}.center-anchor{position:absolute;left:50%;top:52%;transform:translate(-50%,-50%)}.holy{z-index:1;width:310px;height:310px;border-radius:50%;background:repeating-conic-gradient(from -8deg,rgba(255,244,188,.95) 0deg 5deg,rgba(255,255,255,.38) 5deg 9deg,transparent 9deg 18deg),radial-gradient(circle,rgba(255,252,214,.95) 0 10%,rgba(255,224,102,.42) 22%,rgba(255,203,74,.16) 42%,transparent 64%);filter:blur(2.2px);mix-blend-mode:screen;opacity:.78;animation:holySpin 16s linear infinite}.ring{z-index:2;width:245px;height:245px;background:var(--ring) center/contain no-repeat;opacity:.92;mix-blend-mode:screen;animation:ringSpin 7s linear infinite}.ring.ssr{background-image:var(--ringSSR);filter:brightness(1.35) saturate(1.12);animation-duration:4s}.machine{position:absolute;z-index:3;left:50%;top:52%;width:154px;max-height:190px;object-fit:contain;transform:translate(-50%,-50%);filter:drop-shadow(0 16px 18px #0008);animation:float 2.8s ease-in-out infinite}.machine-wrap.ssr .holy{opacity:1;filter:blur(1.6px) brightness(1.25);animation-duration:9s}.draws{display:grid;gap:10px;padding:0 18px 16px}.draw-btn{position:relative;height:72px;border:0;background:center/100% 100% no-repeat;color:#fff8d7;font-size:21px;font-weight:900;text-shadow:0 3px 0 #0008;filter:drop-shadow(0 6px 8px #0006)}.draw-btn.one{background-image:var(--btn1)}.draw-btn.ten{background-image:var(--btn10);font-size:22px}.draw-btn small{display:block;font-size:12px;margin-top:2px;color:#fff0b0}.sub-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}.small-btn{min-height:44px;border:2px solid #b89b58;border-radius:16px;background:#2a1d16dd;color:#fff4d7;font-weight:900}
.results{margin-top:14px;padding:22px 14px 16px;border-radius:26px;background:linear-gradient(#0001,#0003),var(--popup) center/100% 100% no-repeat;min-height:280px}.results h2{margin:0 0 12px;text-align:center;text-shadow:0 3px #0006}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;align-items:start}.grid.single{grid-template-columns:1fr;max-width:220px;margin:auto}.card{position:relative;min-height:198px;background:center/contain no-repeat;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:50px 18px 38px;filter:drop-shadow(0 8px 8px #0005)}.card.frame-r{background-image:var(--cardR)}.card.frame-sr{background-image:var(--cardSR)}.card.frame-ssr{background-image:var(--cardSSR)}.rar{position:absolute;top:18px;left:50%;transform:translateX(-50%);font:900 12px sans-serif;background:#fff4;border:1px solid #fff8;border-radius:999px;padding:2px 8px;color:#5a2f19;text-shadow:0 1px #fff8}.card.frame-ssr .rar{background:#fff0a9;color:#7b234e}.icon{font-size:31px}.name{font-weight:900;font-size:15px;line-height:1.25;color:#2a1d16;text-shadow:0 1px #fff8}.desc{font-size:11px;color:#3b2a1d;line-height:1.3;margin-top:3px;max-width:92px}.book{margin-top:12px;border:2px solid #b89b58;border-radius:20px;background:#2a1d16dd;padding:12px}.chip{display:inline-block;border:1px solid #b89b58;border-radius:999px;padding:4px 8px;margin:3px;background:#fff1;font-size:12px}.modal{position:fixed;inset:0;display:none;place-items:center;background:#0009;z-index:20;padding:22px}.modal.show{display:grid}.rate-panel{position:relative;width:min(390px,100%);min-height:285px;background:var(--rate) center/100% 100% no-repeat;padding:70px 48px 40px;color:#fff4d7;text-shadow:0 2px #000}.close{position:absolute;right:18px;top:14px;width:46px;height:46px;border:0;background:var(--close) center/contain no-repeat}.toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%) translateY(20px);opacity:0;background:#2a1d16ee;border:2px solid #d8b978;border-radius:999px;padding:8px 14px;transition:.2s;z-index:30}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@keyframes holySpin{to{transform:translate(-50%,-50%) rotate(360deg)}}@keyframes ringSpin{to{transform:translate(-50%,-50%) rotate(360deg)}}@keyframes float{0%,100%{transform:translate(-50%,-50%)}50%{transform:translate(-50%,-55%)}}
</style></head>
<body><main class="app"><div class="top"><div><div class="lv">LV.05 / GACHA</div><div class="title">星糖扭蛋</div></div><a class="back" href="room-v18.html">回店內</a></div><div class="pills"><span class="pill">✦ 星糖 <b id="sugar">1280</b></span><span class="pill"><img class="ticket" src="https://drive.google.com/thumbnail?id=1pLijYexb5mKej1ZdeVY45TgHpxsF-_No&sz=w300"> 靈感券 <b id="ticket">3</b></span></div>
<section class="stage"><div class="stage-head"><span class="tag">MOONLIGHT WISH</span><button class="help" id="help" aria-label="機率說明"></button></div><div class="machine-wrap" id="machineWrap"><div class="holy center-anchor"></div><div class="ring center-anchor" id="ring"></div><img class="machine" src="https://drive.google.com/thumbnail?id=1KzsZfW8coXTk4O_kuqLN87MCMI2C9JK7&sz=w900" alt="扭蛋機"></div><div class="draws"><button class="draw-btn one" id="one">抽 1 張<small>券 1 / 星糖 160</small></button><button class="draw-btn ten" id="ten">抽 10 張<small>星糖 1600</small></button><div class="sub-actions"><button class="small-btn" id="free">今日免費</button><button class="small-btn" id="clear">清空結果</button></div></div></section>
<section class="results"><h2>抽取結果</h2><div class="grid" id="result"></div></section><section class="book"><b>今日收藏</b><div id="book"><span class="chip">尚未收藏</span></div></section></main><div class="modal" id="modal"><div class="rate-panel"><button class="close" id="close" aria-label="關閉"></button><h2>機率說明</h2><p>R：普通素材 68%</p><p>SR：稀有甜點 / 委託 24%</p><p>SSR：月光限定靈感 8%</p><p>這是網站互動效果，不含真實金錢。</p></div></div><div class="toast" id="toast">已抽取</div>
<script>
let sugar=1280,ticket=3,free=false,bag=[];const cards=[['ssr','🌙','月光花瓣王冠','溫柔發光的限定素材'],['ssr','🌌','夜空碎片禮盒','星空藍紫夢境系'],['sr','🍓','星星莓奶油塔','金色星屑甜點'],['sr','💌','神祕客人來信','開啟委託主題'],['sr','🫖','月光拿鐵','安定系飲品'],['r','🍪','森林餅乾','普通甜點素材'],['r','🪵','小木牌菜單','店內裝飾素材'],['r','🧺','莓果籃','後山採集素材'],['r','📜','空白委託單','填寫客人需求']];
const $=s=>document.querySelector(s),res=$('#result'),toast=$('#toast'),ring=$('#ring'),machineWrap=$('#machineWrap');
function ui(){$('#sugar').textContent=sugar;$('#ticket').textContent=ticket;$('#book').innerHTML=bag.length?bag.slice(-12).map(c=>'<span class="chip">'+c[1]+' '+c[2]+'</span>').join(''):'<span class="chip">尚未收藏</span>'}
function msg(t){toast.textContent=t;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),900);try{navigator.vibrate&&navigator.vibrate(20)}catch(e){}}
function pick(){let r=Math.random(),kind=r<.08?'ssr':r<.32?'sr':'r';let p=cards.filter(c=>c[0]===kind);return p[Math.floor(Math.random()*p.length)]}
function card(c){const frame={r:'frame-r',sr:'frame-sr',ssr:'frame-ssr'}[c[0]];return '<article class="card '+frame+'"><span class="rar">'+c[0].toUpperCase()+'</span><div class="icon">'+c[1]+'</div><div class="name">'+c[2]+'</div><div class="desc">'+c[3]+'</div></article>'}
function draw(n){let out=[];for(let i=0;i<n;i++){let c=pick();out.push(c);bag.push(c)}const hasSSR=out.some(c=>c[0]==='ssr');ring.classList.toggle('ssr',hasSSR);machineWrap.classList.toggle('ssr',hasSSR);res.classList.toggle('single',n===1);res.innerHTML=out.map(card).join('');ui();msg('抽到 '+n+' 張靈感卡')}
$('#one').onclick=()=>{if(ticket>0){ticket--;draw(1);return}if(sugar<160)return msg('星糖不足');sugar-=160;draw(1)};$('#ten').onclick=()=>{if(sugar<1600)return msg('星糖不足');sugar-=1600;draw(10)};$('#free').onclick=()=>{if(free)return msg('今天已抽過');free=true;draw(1)};$('#clear').onclick=()=>{res.innerHTML='';msg('已清空結果')};$('#help').onclick=()=>$('#modal').classList.add('show');$('#close').onclick=()=>$('#modal').classList.remove('show');ui();
</script></body></html>
