<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>精靈咖啡屋店內 v18</title><style>:root{--gold:#f7d87b;--line:#b89b58;--dark:#2a1d16;--green:#123b29;--cream:#fff4d7}*{box-sizing:border-box}body{margin:0;background:#0e2f20;color:var(--cream);font-family:serif}.app{max-width:430px;margin:auto;min-height:100vh;background:radial-gradient(circle at 50% 0,#1d5a3d,#123b29 44%,#0d2419);padding:16px 14px 20px}.top{display:flex;align-items:flex-end;justify-content:space-between;gap:10px;margin:14px 0 10px}.title{font-size:32px;font-weight:900;letter-spacing:.05em;text-shadow:0 3px #0004}.lv{font-size:12px;letter-spacing:.2em;opacity:.78}.pills{display:flex;gap:7px;flex-wrap:wrap;margin:8px 0 14px}.pill{border:2px solid var(--line);border-radius:999px;padding:6px 10px;background:#2a2118d9;box-shadow:inset 0 -3px #0002}.head{display:flex;justify-content:space-between;align-items:center;margin:10px 0}.back{padding:8px 14px;border-radius:999px;background:linear-gradient(#fff0a9,#efb85e);color:#2b1d13;font-weight:900;border:2px solid #d8b978;text-decoration:none;box-shadow:0 4px #0003}.map{position:relative;height:390px;border:3px solid #d8b978;border-radius:24px;overflow-x:auto;overflow-y:hidden;background:#173f2c;-webkit-overflow-scrolling:touch;scrollbar-color:#f7d87b55 transparent;box-shadow:0 10px 24px #0004,inset 0 0 0 5px #fff2}.world{position:relative;width:780px;height:390px;background:linear-gradient(#ffffff10,#00000020),url('https://drive.google.com/thumbnail?id=1xLva8jEHumD53I5IOSFH8CXH9ba6kCkN&sz=w1200') center/cover no-repeat}.hot{position:absolute;width:26px;height:26px;border:2px solid #fff4bd;border-radius:50%;background:#f7d87b;box-shadow:0 0 0 8px #f7d87b55,0 0 20px #f7d87b;appearance:none;padding:0;animation:pulse 1.7s infinite}.hot span{position:absolute;left:50%;top:29px;transform:translateX(-50%);white-space:nowrap;background:#2a1d16e8;border:2px solid #d8b978;border-radius:999px;padding:4px 8px;font-size:12px;color:#fff4d7}.hot.on{background:#91f0d0;box-shadow:0 0 0 9px #91f0d055,0 0 22px #91f0d0}.menu{left:198px;top:220px}.cabinet{left:92px;top:252px}.quest{left:438px;top:232px}.order{left:640px;top:150px}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.act{position:relative;min-height:70px;border:2px solid var(--line);border-radius:18px;background:linear-gradient(#3c2a1e,#201610);color:#fff4d7;font-size:18px;font-weight:900;box-shadow:inset 0 -4px #0003,0 6px 14px #0003}.act small{display:block;font-size:11px;opacity:.72;margin-top:3px}.act.on{background:linear-gradient(#fff1ad,#efb85e);color:#2b1d13;transform:translateY(-2px)}.badge{position:absolute;right:8px;top:-8px;background:#ff654b;color:white;border:2px solid #ffe9b0;border-radius:999px;padding:2px 6px;font-size:11px;font-family:sans-serif}.npc{display:grid;grid-template-columns:54px 1fr;gap:10px;align-items:center;margin-top:12px;border:3px solid #d8b978;border-radius:22px;background:#2a1d16e8;padding:10px}.face{width:54px;height:54px;border-radius:16px;background:linear-gradient(#dbffe5,#6aa974);display:grid;place-items:center;font-size:28px}.say{font-size:14px;line-height:1.55}.panel{margin-top:12px;border:3px solid #d8b978;border-radius:22px;background:linear-gradient(#3a281d,#211610);padding:16px;min-height:170px;box-shadow:0 10px 22px #0004}.kicker{display:inline-block;background:#f4d676;color:#2b1d13;border-radius:999px;padding:5px 10px;font-size:12px;font-weight:900;letter-spacing:.12em}.panel h2{margin:10px 0}.panel p{line-height:1.65;margin:0}.grid{display:grid;gap:9px;margin-top:10px}.card{border:2px solid #b89b58;border-radius:16px;background:#fff2;padding:10px}.stars{color:#ffe38a;letter-spacing:.08em}.row{display:flex;justify-content:space-between;gap:8px;align-items:center}.mini{font-size:12px;opacity:.8}.choices{display:grid;gap:8px;margin-top:12px}.choice{border:2px solid #b89b58;border-radius:14px;background:#3a291f;color:#fff4d7;padding:10px;text-align:left;font-weight:900}.choice.good{background:#315c3a}.choice.warn{background:#654024}.dock{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:12px;position:sticky;bottom:8px}.dock button{position:relative;border:2px solid #b89b58;border-radius:14px;background:#2a1d16e8;color:#fff4d7;padding:8px 2px;font-weight:900;box-shadow:0 5px 14px #0003}.dock button.on{background:#efb85e;color:#2b1d13}.dot{position:absolute;right:7px;top:5px;width:9px;height:9px;background:#ff654b;border-radius:50%}.toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%) translateY(20px);opacity:0;background:#2a1d16ee;border:2px solid #d8b978;border-radius:999px;padding:8px 14px;color:#fff4d7;transition:.2s;pointer-events:none;z-index:9}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}@keyframes pulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.25)}}</style></head><body><main class="app"><div class="top"><div><div class="lv">LV.05 / FOREST CAFE</div><div class="title">精靈咖啡屋</div></div><div>🧁</div></div><div class="pills"><span class="pill">☀️ 森林午後</span><span class="pill">✦ 星糖 <b id="sugar">128</b></span><span class="pill">🌕 葉幣 <b id="coin">320</b></span></div><div class="head"><div><b>INTERIOR</b><br>咖啡廳內部</div><a class="back" href="./">返回地圖</a></div><section class="map" id="roomMap"><div class="world"><button class="hot menu on" data-panel="menu"><span>今日菜單</span></button><button class="hot cabinet" data-panel="cabinet"><span>商品櫃</span></button><button class="hot quest" data-panel="quest"><span>接委託</span></button><button class="hot order" data-panel="order"><span>客人訂單</span></button></div></section><section class="actions"><button class="act on" data-panel="menu">今日菜單<small>MENU</small><i class="badge">NEW</i></button><button class="act" data-panel="quest">接委託<small>ORDER</small><i class="badge">!</i></button><button class="act" data-panel="cabinet">商品櫃<small>DISPLAY</small></button><button class="act" data-panel="order">客人訂單<small>LOG</small><i class="badge">2</i></button></section><section class="npc"><div class="face">👩‍🍳</div><div class="say" id="npcText">歡迎回來～今天有新的委託，也有期間限定甜點。</div></section><section class="panel" id="panel"></section><nav class="dock"><button data-dock="check" class="on">✅<br>簽到<span class="dot"></span></button><button data-dock="decor">🏠<br>裝飾</button><button data-dock="bag">🧺<br>庫存</button><button data-dock="orders">📋<br>委託<span class="dot"></span></button><button data-dock="settings">⚙️<br>設定</button></nav></main><div class="toast" id="toast">已切換</div><script>let sugar=128,coin=320,checked=false;const data={menu:{k:'MENU BOARD',t:'今日菜單',x:110,npc:'今天推薦月光花瓣拿鐵，喝起來會有一點點發光。',html:'<div class="grid"><div class="card"><div class="row"><b>月光花瓣拿鐵</b><span class="stars">★★★</span></div><p class="mini">安定系飲品 / 讓委託氛圍變柔和</p></div><div class="card"><div class="row"><b>星星莓奶油塔</b><span class="stars">★★★★</span></div><p class="mini">人氣甜點 / 金色星屑特效</p></div><div class="card"><div class="row"><b>夜空碎片可可</b><span class="stars">★★★★★</span></div><p class="mini">夢境限定 / 星空藍紫色系</p></div></div>'},quest:{k:'COMMISSION COUNTER',t:'接委託',x:360,npc:'有客人想點一份藍紫星空系的亮晶晶委託，要接嗎？',html:'<div class="card"><b>新委託：星空藍紫亮晶晶</b><p class="mini">預算 NT$800～1200 / 希望有貓咪與星屑</p></div><div class="choices"><button class="choice good" data-action="accept">接受委託</button><button class="choice warn" data-action="rules">查看委託規則</button></div>'},cabinet:{k:'DISPLAY CABINET',t:'商品櫃',x:0,npc:'玻璃櫃裡放著可以展示的委託品項，亮晶晶郵票很受歡迎。',html:'<div class="grid"><div class="card"><div class="row"><b>QQ 小甜點</b><span>NT$600+</span></div><p class="mini">可愛系 / 大頭展示</p></div><div class="card"><div class="row"><b>亮晶晶郵票</b><span>NT$300+</span></div><p class="mini">收藏系 / 閃亮紀念</p></div><div class="card"><div class="row"><b>插圖驚喜包</b><span>NT$800+</span></div><p class="mini">盲盒系 / 店長加料</p></div></div>'},order:{k:'ORDER LOG',t:'客人訂單',x:430,npc:'目前有 2 筆訂單需要你確認，別忘了整理排單。',html:'<div class="grid"><div class="card"><div class="row"><b>待確認</b><span class="badge">2</span></div><p class="mini">客人送來需求單，等待確認預算。</p></div><div class="card"><b>製作中</b><p class="mini">草圖與色彩調配中。</p></div><div class="card"><b>已完成</b><p class="mini">完成後交付魔法包裹。</p></div></div>'}};const panel=document.querySelector('#panel'),map=document.querySelector('#roomMap'),toast=document.querySelector('#toast'),npc=document.querySelector('#npcText');function vib(){try{navigator.vibrate&&navigator.vibrate(18)}catch(e){}}function showToast(t){toast.textContent=t;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),900);vib()}function openPanel(name){const item=data[name]||data.menu;document.querySelectorAll('[data-panel]').forEach(el=>el.classList.toggle('on',el.dataset.panel===name));panel.innerHTML=`<span class="kicker">${item.k}</span><h2>${item.t}</h2>${item.html}`;npc.textContent=item.npc;map.scrollTo({left:item.x,behavior:'smooth'});showToast('已切換到：'+item.t)}document.querySelectorAll('[data-panel]').forEach(el=>el.addEventListener('click',()=>openPanel(el.dataset.panel)));document.querySelector('.dock').addEventListener('click',e=>{const b=e.target.closest('[data-dock]');if(!b)return;document.querySelectorAll('[data-dock]').forEach(x=>x.classList.remove('on'));b.classList.add('on');const d=b.dataset.dock;if(d==='check'){if(!checked){checked=true;sugar+=10;coin+=20;document.querySelector('#sugar').textContent=sugar;document.querySelector('#coin').textContent=coin;b.querySelector('.dot')?.remove();showToast('簽到成功：星糖+10 葉幣+20')}else showToast('今天已簽到')}if(d==='bag'){panel.innerHTML='<span class="kicker">INVENTORY</span><h2>素材庫存</h2><div class="grid"><div class="card">🌙 月光花瓣 ×3</div><div class="card">🍓 星星莓 ×5</div><div class="card">🌌 夜空碎片 ×2</div></div>';npc.textContent='素材都整理好了，可以拿來做甜點或委託。'}if(d==='orders')openPanel('order');if(d==='decor'){showToast('裝飾功能準備中');npc.textContent='之後可以換桌布、櫃台和小擺飾。'}if(d==='settings'){panel.innerHTML='<span class="kicker">SETTINGS</span><h2>設定</h2><div class="grid"><div class="card">🔊 音效：開</div><div class="card">📳 震動：開</div><div class="card">🌙 深色沉浸模式</div></div>';npc.textContent='這裡先放設定入口。'}});panel.addEventListener('click',e=>{const a=e.target.closest('[data-action]');if(!a)return;if(a.dataset.action==='accept'){coin+=80;document.querySelector('#coin').textContent=coin;showToast('已接受委託：葉幣+80');npc.textContent='委託已放進訂單列表，店長開始準備材料！'}if(a.dataset.action==='rules'){showToast('規則：先出圖後收款，無固定工期');npc.textContent='規則已經寫在櫃台小卡上，客人可以慢慢看。'}});openPanel('menu');</script></body></html>
